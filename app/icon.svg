<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Dark forensic background -->
  <rect width="32" height="32" rx="5" fill="#0F1115"/>

  <!-- Outer ring -->
  <circle cx="16" cy="16" r="12.5" stroke="#ef4444" stroke-width="1.8"/>

  <!-- Inner dashed ring -->
  <circle cx="16" cy="16" r="7" stroke="#ef4444" stroke-width="1.2" stroke-dasharray="2.8 2"/>

  <!-- Center target dot -->
  <circle cx="16" cy="16" r="2.2" fill="#ef4444"/>

  <!-- Crosshair — Left -->
  <line x1="1.5" y1="16" x2="7.5" y2="16" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Crosshair — Right -->
  <line x1="24.5" y1="16" x2="30.5" y2="16" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Crosshair — Top -->
  <line x1="16" y1="1.5" x2="16" y2="7.5" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round"/>
  <!-- Crosshair — Bottom -->
  <line x1="16" y1="24.5" x2="16" y2="30.5" stroke="#ef4444" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Corner tick marks — top-left -->
  <line x1="5" y1="5" x2="8" y2="5" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="5" y1="5" x2="5" y2="8" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Corner tick marks — top-right -->
  <line x1="27" y1="5" x2="24" y2="5" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="27" y1="5" x2="27" y2="8" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Corner tick marks — bottom-left -->
  <line x1="5" y1="27" x2="8" y2="27" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="5" y1="27" x2="5" y2="24" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
  <!-- Corner tick marks — bottom-right -->
  <line x1="27" y1="27" x2="24" y2="27" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="27" y1="27" x2="27" y2="24" stroke="#ef4444" stroke-width="1.2" stroke-linecap="round"/>
</svg>
